<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우리 라이딩 카페</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    header {
      background: url('https://images.unsplash.com/photo-1517649763962-0c623066013b?q=80&w=1600&auto=format&fit=crop') center/cover;
      padding: 120px 20px;
    }

    header h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    header p {
      font-size: 20px;
    }

    .section {
      padding: 50px 20px;
    }

    .card {
      background: #222;
      margin: 20px auto;
      padding: 20px;
      border-radius: 15px;
      max-width: 500px;
    }

    .button {
      display: inline-block;
      padding: 15px 25px;
      margin-top: 15px;
      background: #00c853;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
    }

    .button:hover {
      background: #00e676;
    }

    footer {
      padding: 30px;
      background: #000;
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>

<body>

  <header>
    <h1>우리 라이딩 카페</h1>
    <p>함께 달리는 즐거움</p>
  </header>

  <div class="section">
    <h2>이번 주 라이딩 일정</h2>

    <div class="card">
      <h3>토요 정기 라이딩</h3>
      <p>출발: 오전 8시</p>
      <p>장소: 안산 호수공원</p>
      <p>거리: 80km</p>

      <a class="button" href="https://cafe.naver.com/" target="_blank">
        참가 신청
      </a>
    </div>
  </div>

  <div class="section">
    <h2>커뮤니티</h2>

    <a class="button" href="https://open.kakao.com/" target="_blank">
      카카오 오픈채팅
    </a>

    <br><br>

    <a class="button" href="https://www.strava.com/" target="_blank">
      Strava
    </a>
  </div>

  <footer>
    © 2026 우리 라이딩 카페
  </footer>

</body>
</html>
