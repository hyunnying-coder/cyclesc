<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOUL CALENDAR</title>
<style>
  * {box-sizing: border-box;}

  body {
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #111827;
    color: #f3f4f6;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url('watermark.png');
    background-size: contain; 
    background-position: center;
    background-repeat: no-repeat;
    opacity: 0.85;
    z-index: -2;
  }

  /* 상단 헤더 */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 25px 16px 10px 16px;
    background: transparent;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header h1 {
    margin: 0;
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  /* 우측 링크들을 감싸는 컨테이너 추가 (정렬용) */
  .header-links {
    display: flex;
    gap: 8px; /* 버튼 사이의 간격 */
    align-items: center;
  }

  /* 공통 링크 스타일 */
  .top-right-link {
    font-size: 12px;
    color: #9ca3af;
    text-decoration: none;
    padding: 4px 8px;
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.05);
    transition: 0.2s;
  }

  .top-right-link:hover {
    color: #ffffff;
    background: rgba(255, 255, 255, 0.15);
  }

  /* ★ 이벤트 버튼 전용 스타일 추가 (하늘색 배경, 검은색 글씨) */
  .top-right-link.event-link {
    background: #38bdf8; /* 하늘색 (Tailwind sky-400 컬러 치수) */
    color: #000000;      /* 검은색 글씨 */
    font-weight: bold;   /* 가독성을 위해 살짝 두껍게 처리 */
  }

  .top-right-link.event-link:hover {
    background: #7dd3fc; /* 호버 시 조금 더 밝은 하늘색 */
    color: #000000;
  }

  /* 컨테이너 */
  .container {
    max-width: 600px;
    margin: 0 auto;
    padding: 16px;
  }

  /* 월 섹션 타이틀 */
  .month-section-title {
    font-size: 22px;
    font-weight: bold;
    margin: 20px 0 10px 4px;
    color: #f3f4f6;
    border-bottom: 2px solid rgba(255, 255, 255, 0.1);
    padding-bottom: 8px;
  }

  /* 날짜 그룹 */
  .date-group {
    margin-bottom: 20px;
    scroll-margin-top: 80px;
  }
  
  .date-title {
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 8px;
    margin-left: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .date-title .badge {
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 5px;
    font-weight: normal;
  }

  .badge.today { background: #22c55e !important; color: white !important; }
  .badge.sun { background: #ef4444; color: white; }
  .badge.sat { background: #3b82f6; color: white; }
  .badge.weekday { background: #4b5563; color: white; }

  /* 라이딩 카드 리스트 박스 */
  .ride-list {
    background: rgba(31, 41, 55, 0.2);
    backdrop-filter: blur(8px);
    border-radius: 18px;
    padding: 4px 16px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.05);
  }

  .ride-item {
    display: flex;
    align-items: flex-start;
    padding: 14px 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    text-decoration: none;
    color: inherit;
    transition: background 0.2s;
  }

  .ride-item:last-child {
    border-bottom: none;
  }

  .ride-item:hover {
    background: rgba(255, 255, 255, 0.03);
  }

  .ride-icon {
    margin-right: 14px;
    margin-top: 5px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 6px rgba(0, 0, 0, 0.5);
  }

  .ride-icon.easy { background: #22c55e; }
  .ride-icon.mid  { background: #3b82f6; }
  .ride-icon.hard { background: #ef4444; }

  .ride-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .ride-title {
    font-size: 15px;
    font-weight: bold;
    line-height: 1.4;
    color: #f9fafb;
  }

  .ride-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: #9ca3af;
    margin-top: 2px;
  }

  .author {
    color: #9ca3af;
  }
</style>
</head>
<body>

<div class="header">
  <h1>🚴 SOUL CALENDAR</h1>
  <div class="header-links">
    <a href="https://naver.me/5K6wtMrp" target="_blank" class="top-right-link event-link">EVENT</a>
    <a href="https://m.smartstore.naver.com/hayshop?NaPm=ct%3Dmptafsiz%7Cci%3Dcheckout%7Ctr%3Dds%7Ctrx%3Dnull%7Chk%3D46e15df91a7ceb6f78f45fe960341ddfca40936e" target="_blank" class="top-right-link">자전거용품</a>

  <div class="date-group" data-date="6-28">

    <div class="ride-list">
      <a href="https://naver.me/GlRWPioT" target="_blank" class="ride-item">

</div>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    const today = new Date();
    const currentMonth = today.getMonth() + 1;
    const currentDate = today.getDate();
    const todayFormat = `${currentMonth}-${currentDate}`;
    const todayTarget = document.querySelector(`.date-group[data-date="${todayFormat}"]`);

    if (todayTarget) {
      const badge = todayTarget.querySelector('.date-title .badge');
      if (badge) {
        badge.innerText = `오늘 ${badge.innerText}`;
        badge.className = 'badge today';
      }
      setTimeout(() => {
        todayTarget.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 300); 
    }
  });
</script>

</body>
</html>
