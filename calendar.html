<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>라이딩 달력</title>

<style>
body{
  font-family:Arial;
  background:#f2f4f6;
  margin:0;
  padding:20px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:10px;
}

.day{
  background:white;
  border-radius:12px;
  min-height:100px;
  padding:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.08);
}

.date{
  font-weight:bold;
  margin-bottom:10px;
}

.ride{
  background:#3182f6;
  color:white;
  padding:5px;
  border-radius:8px;
  font-size:12px;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="header">
  <h1>🚴 라이딩 달력</h1>

  <a href="index.html">
    리스트 보기
  </a>
</div>

<div class="calendar">

<div class="day">
<div class="date">1</div>
</div>

<div class="day">
<div class="date">2</div>

<div class="ride">
오이도 야라
</div>
</div>

<div class="day">
<div class="date">3</div>

<div class="ride">
시화방조제
</div>

<div class="ride">
초급벙
</div>
</div>

<div class="day">
<div class="date">4</div>
</div>

<div class="day">
<div class="date">5</div>
</div>

<div class="day">
<div class="date">6</div>
</div>

<div class="day">
<div class="date">7</div>
</div>

</div>

</body>
</html>
