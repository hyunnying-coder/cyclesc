<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOUL CALENDAR</title>
<style>
  * {box-sizing: border-box;}

  body {
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #111827;
    color: #f3f4f6;
    position: relative;
    overflow-x: hidden;
  }

  /* 기존 배경 이미지 속성 유지 */

  body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background-image: url('watermark.png');
  background-size: contain; 
  background-position: center;
  background-repeat: no-repeat;

  opacity: 0.85;
  z-index: -2;
}


  /* 상단 헤더: 배경 음영 제거 */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 25px 16px 10px 16px;
    background: transparent;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header h1 {
    margin: 0;
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  /* 컨테이너 */
  .container {
    max-width: 600px;
    margin: 0 auto;
    padding: 16px;
  }

  /* 월 섹션 타이틀 */
  .month-section-title {
    font-size: 22px;
    font-weight: bold;
    margin: 20px 0 10px 4px;
    color: #f3f4f6;
    border-bottom: 2px solid rgba(255, 255, 255, 0.1);
    padding-bottom: 8px;
  }

  /* 날짜 그룹 */
  .date-group {
    margin-bottom: 20px;
  }
  
  .date-title {
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 8px;
    margin-left: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .date-title .badge {
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 5px;
    font-weight: normal;
  }

  /* 요일별 색상 배지 */
  .badge.today { background: #22c55e; color: white; }
  .badge.sun { background: #ef4444; color: white; }
  .badge.sat { background: #3b82f6; color: white; }
  .badge.weekday { background: #4b5563; color: white; }

  /* 라이딩 카드 리스트 박스 */
  .ride-list {
    background: rgba(31, 41, 55, 0.2);
    backdrop-filter: blur(8px);
    border-radius: 18px;
    padding: 4px 16px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.05);
  }

  /* 각각의 라이딩 아이템 */
  .ride-item {
    display: flex;
    align-items: flex-start;
    padding: 14px 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    text-decoration: none;
    color: inherit;
    transition: background 0.2s;
  }

  .ride-item:last-child {
    border-bottom: none;
  }

  .ride-item:hover {
    background: rgba(255, 255, 255, 0.03);
  }

  /* 난이도별 동그라미 아이콘 공통 설정 */
  .ride-icon {
    margin-right: 14px;
    margin-top: 5px; /* 글자 높이와 맞추기 위한 조정 */
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 6px rgba(0, 0, 0, 0.5); /* 동그라미 입체감 */
  }

  .ride-icon.easy { background: #22c55e; } /* 초급 = 초록색 동그라미 */
  .ride-icon.mid  { background: #3b82f6; } /* 중급 = 파란색 동그라미 */
  .ride-icon.hard { background: #ef4444; } /* 상급 = 빨간색 동그라미 */

  /* 본문 컨텐츠 구역 */
  .ride-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  /* 제목 및 시간 */
  .ride-title {
    font-size: 15px;
    font-weight: bold;
    line-height: 1.4;
    color: #f9fafb;
  }

  /* 하단 메타 정보 */
  .ride-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: #9ca3af;
    margin-top: 2px;
  }

  .author {
    color: #9ca3af;
  }


/*여기에 추가된 자전거용품 스타일 코드*/

  transition: 0.2s;
}

.top-right-link:hover {
  color: #ffffff;
  background: rgba(255, 255, 255, 0.15);}
/*여기까지*/

</style>
