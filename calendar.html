<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOUL RIDING SCHEDULE</title>
<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #111827;
    color: #f3f4f6;
    position: relative;
    overflow-x: hidden;
  }

  /* 기존 배경 이미지 속성 유지 */
  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url('watermark.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    opacity: 0.35;
    z-index: -2;
  }

  /* 상단 헤더: 배경 음영 및 테두리 제거 */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 16px 10px 16px; /* 아래 여백 조절 */
    background: transparent; /* 음영 제거 */
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header h1 {
    margin: 0;
    font-size: 24px; /* 기존 코드의 시원한 크기 반영 */
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  /* 컨테이너 */
  .container {
    max-width: 600px;
    margin: 0 auto;
    padding: 16px;
  }

  /* 날짜 헤더 */
  .date-group {
    margin-top: 24px;
  }
  
  .date-title {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .date-title .badge {
    font-size: 12px;
    padding: 3px 8px;
    border-radius: 6px;
    font-weight: normal;
  }

  /* 요일별 색상 배지 */
  .badge.today { background: #10b981; color: white; }
  .badge.sun { background: #ef4444; color: white; }
  .badge.sat { background: #3b82f6; color: white; }
  .badge.weekday { background: #6b7280; color: white; }

  /* 라이딩 카드 리스트 박스 */
  .ride-list {
    background: rgba(31, 41, 55, 0.45);
    backdrop-filter: blur(8px);
    border-radius: 20px;
    padding: 8px 16px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.05);
  }

  /* 각각의 라이딩 아이템 */
  .ride-item {
    display: flex;
    align-items: flex-start;
    padding: 16px 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    text-decoration: none;
    color: inherit;
    transition: background 0.2s;
  }

  .ride-item:last-child {
    border-bottom: none;
  }

  .ride-item:hover {
    background: rgba(255, 255, 255, 0.03);
  }

  /* 난이도별 번개 아이콘 설정 */
  .ride-icon {
    margin-right: 12px;
    margin-top: 2px;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 24px;
  }

  /* 난이도 색상 클래스 추가 */
  .ride-icon.easy { color: #22c55e; } /* 초급 = 초록색 */
  .ride-icon.mid  { color: #3b82f6; } /* 중급 = 파란색 */
  .ride-icon.hard { color: #ef4444; } /* 상급 = 빨간색 */

  /* 본문 컨텐츠 구역 */
  .ride-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  /* 제목 행 */
  .ride-title {
    font-size: 15px;
    font-weight: bold;
    line-height: 1.4;
    color: #f9fafb;
  }

  /* 작성자 및 인원 수 행 */
  .ride-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: #9ca3af;
    margin-top: 2px;
  }

  .author {
    color: #9ca3af;
  }

  .count {
    color: #f43f5e;
    font-weight: bold;
  }
</style>
</head>
<body>

<!-- 타이틀 구역 배경 투명화 완료 -->
<div class="header">
  <h1>🚴 SOUL CALENDAR</h1>
</div>

<div class="container">

  <!-- ================= 5월 31일 (일) ================= -->
  <div class="date-group">
    <div class="date-title">
      5월 31일 <span class="badge today">오늘</span>
    </div>
    
    <div class="ride-list">
      <!-- 중급 (mid) 예시 -->
      <a href="링크주소" class="ride-item">
        <div class="ride-icon mid">⚡</div>
        <div class="ride-info">
          <div class="ride-title">[30~33] 5/31(일) 7:30 태읍 👍팔당찍턴 👍면포도궁 사라다빵 X 성남이다 두초빙</div>
          <div class="ride-meta">
            <span class="author">없템포 김민수</span>
            <span class="count">53</span>
          </div>
        </div>
      </a>

      <!-- 초급 (easy) 예시 -->
      <a href="링크주소" class="ride-item">
        <div class="ride-icon easy">⚡</div>
        <div class="ride-info">
          <div class="ride-title">[초급] 5/31(일) 오전 7시반 태읍, 시우리 딸기쥬스 재방문 / 천호동 서초면옥 냉면</div>
          <div class="ride-meta">
            <span class="author">여겨아범 김중현</span>
            <span class="count">27</span>
          </div>
        </div>
      </a>
    </div>
  </div>


  <!-- ================= 6월 1일 (월) ================= -->
  <div class="date-group">
    <div class="date-title">
      6월 1일 <span class="badge weekday">월</span>
    </div>
    
    <div class="ride-list">
      <!-- 상급 (hard) 예시 -->
      <a href="링크주소" class="ride-item">
        <div class="ride-icon hard">⚡</div>
        <div class="ride-info">
          <div class="ride-title">[35-45+] 6.1(월), 19:30 / 캡틴의 운동방 공크 X 4</div>
          <div class="ride-meta">
            <span class="author">캡틴 안영찬</span>
            <span class="count">56</span>
          </div>
        </div>
      </a>
    </div>
  </div>

</div>

</body>
</html>
